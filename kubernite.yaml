---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: aplication_front_portefolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aplication_front_portefolio
  template:
    metadata:
      labels:
        app: aplication_front_portefolio
    spec:
      containers:
        - name: nginx
          image: front_portefolio:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP

...
apiVersion: v1
kind: Service
metadata:
  name: serveur-portefolio-service
spec:
  selector:
    app: aplication_front_portefolio
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
  type: LoadBalancer
...
